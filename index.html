<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkdriller Contact Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --primary-light: #e6eaf8;
            --secondary: #7209b7;
            --accent: #f72585;
            --success: #4cc9f0;
            --error: #ef233c;
            --warning: #f8961e;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --border-radius: 12px;
            --border-radius-lg: 16px;
            --border-radius-sm: 8px;
            --box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            --box-shadow-lg: 0 15px 50px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f7ff;
            background-image: 
                radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.1) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
            color: var(--dark);
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }
        
        .card {
            background: white;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--box-shadow-lg);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: var(--transition);
            position: relative;
            z-index: 1;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--gradient);
            z-index: 2;
        }
        
        .card:hover {
            transform: translateY(-5px) rotateX(1deg);
            box-shadow: var(--box-shadow-lg);
        }
        
        .card-header {
            padding: 2rem 2.5rem 1rem;
            text-align: center;
            position: relative;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }
        
        .logo i {
            font-size: 2.5rem;
            color: white;
        }
        
        .card-header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card-header p {
            color: var(--gray);
            font-size: 1rem;
            max-width: 80%;
            margin: 0 auto;
            font-weight: 400;
        }
        
        .card-body {
            padding: 0 2.5rem 2.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--light-gray);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
            background-color: white;
            font-family: inherit;
            color: var(--dark);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        .form-control::placeholder {
            color: var(--gray);
            opacity: 0.6;
        }
        
        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }
        
        .input-icon {
            position: absolute;
            right: 1.25rem;
            top: 3.1rem;
            color: var(--gray);
            font-size: 1rem;
        }
        
        .input-hint {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 0.5rem;
            display: block;
            font-style: italic;
        }
        
        .btn {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--gradient);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary-dark) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn i {
            font-size: 1.1rem;
        }
        
        #status {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: var(--border-radius);
            text-align: center;
            font-size: 0.95rem;
            display: none;
            line-height: 1.6;
        }
        
        .status-success {
            background-color: rgba(76, 201, 240, 0.1);
            color: #1098ad;
            border: 1px solid #4cc9f0;
            display: block;
        }
        
        .status-error {
            background-color: rgba(239, 35, 60, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            display: block;
        }
        
        .status-warning {
            background-color: rgba(248, 150, 30, 0.1);
            color: #d9480f;
            border: 1px solid var(--warning);
            display: block;
        }
        
        .status-loading {
            color: var(--gray);
            display: block;
        }
        
        /* Media upload styles */
        .media-upload-container {
            margin-bottom: 1.5rem;
        }
        
        .media-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            border: 2px dashed var(--light-gray);
            border-radius: var(--border-radius);
            background-color: white;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .media-upload-label:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }
        
        .media-upload-label i {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .media-upload-label span {
            color: var(--gray);
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.6;
        }
        
        .media-upload-label strong {
            color: var(--primary);
            font-weight: 600;
        }
        
        #mediaFile {
            display: none;
        }
        
        .media-preview {
            margin-top: 1.5rem;
            display: none;
        }
        
        .media-preview img, .media-preview video {
            max-width: 100%;
            border-radius: var(--border-radius);
            max-height: 250px;
            object-fit: contain;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--light-gray);
        }
        
        .media-preview audio {
            width: 100%;
            margin-top: 1rem;
            border-radius: 50px;
        }
        
        .file-preview {
            display: flex;
            align-items: center;
            padding: 1rem;
            background-color: white;
            border-radius: var(--border-radius);
            margin-bottom: 0.75rem;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
            border: 1px solid var(--light-gray);
        }
        
        .file-preview:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }
        
        .file-preview i {
            font-size: 1.8rem;
            margin-right: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .file-info {
            flex: 1;
            overflow: hidden;
        }
        
        .file-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--dark);
        }
        
        .file-size {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: 0.25rem;
        }
        
        .file-progress {
            width: 100%;
            height: 4px;
            background: var(--light-gray);
            border-radius: 2px;
            margin-top: 0.75rem;
            overflow: hidden;
            display: none;
        }
        
        .file-progress-bar {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .remove-media {
            margin-top: 1rem;
            color: var(--error);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            background-color: rgba(239, 35, 60, 0.1);
        }
        
        .remove-media:hover {
            background-color: rgba(239, 35, 60, 0.2);
        }
        
        /* Social links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-gray);
            color: var(--dark);
            transition: var(--transition);
            font-size: 1.1rem;
        }
        
        .social-link:hover {
            background: var(--gradient);
            color: white;
            transform: translateY(-3px);
        }
        
        /* Floating decoration elements */
        .decoration {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }
        
        .decoration-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(114, 9, 183, 0.1) 0%, rgba(114, 9, 183, 0) 70%);
            top: -150px;
            right: -150px;
        }
        
        .decoration-2 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(67, 97, 238, 0.1) 0%, rgba(67, 97, 238, 0) 70%);
            bottom: -100px;
            left: -100px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .card {
                padding: 1.5rem;
            }
            
            .card-header h1 {
                font-size: 1.8rem;
            }
            
            .card-header p {
                max-width: 100%;
            }
            
            .logo {
                width: 70px;
                height: 70px;
            }
        }
        
        @media (max-width: 480px) {
            .card-header, .card-body {
                padding: 1.5rem 1.25rem;
            }
            
            .card-header h1 {
                font-size: 1.6rem;
            }
        }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Decorative elements -->
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        
        <div class="card">
            <div class="card-header">
                <div class="logo floating">
                    <i class="fas fa-envelope"></i>
                </div>
                <h1>Contact <span>pkdriller</span></h1>
                <p>Get in touch with our team - we typically respond within 24 hours</p>
            </div>
            
            <div class="card-body">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                        <i class="fas fa-user input-icon"></i>
                        <span class="input-hint">Please enter your complete name</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                        <span class="input-hint">We'll never share your email</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="contact">Phone Number</label>
                        <input type="tel" id="contact" class="form-control" placeholder="+254×××××××" required>
                        <i class="fas fa-phone input-icon"></i>
                        <span class="input-hint">Include country code (e.g. +1, +44, +92)</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" class="form-control" required>
                            <option value="" disabled selected>Select a subject</option>
                            <option value="General Inquiry">General Inquiry</option>
                            <option value="Service Request">Service Request</option>
                            <option value="Technical Support">Technical Support</option>
                            <option value="Feedback">Feedback</option>
                            <option value="Other">Other</option>
                        </select>
                        <i class="fas fa-tag input-icon"></i>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" class="form-control" placeholder="How can we help you today?" required></textarea>
                        <i class="fas fa-comment input-icon" style="top: 1.2rem;"></i>
                        <span class="input-hint">Please provide detailed information</span>
                    </div>
                    
                    <div class="form-group media-upload-container">
                        <label class="media-upload-label" for="mediaFile">
                            <i class="fas fa-cloud-upload-alt pulse"></i>
                            <span>Upload supporting files <strong>(Optional)</strong></span>
                            <span class="input-hint">Max 20MB - Images, Videos, Documents, etc.</span>
                        </label>
                        <input type="file" id="mediaFile" accept="*/*">
                        <div class="media-preview" id="mediaPreview"></div>
                    </div>
                    
                    <div class="form-group">
                        <div class="form-control" style="background-color: var(--primary-light); border: none; padding: 1rem;">
                            <label style="margin-bottom: 0.5rem; display: flex; align-items: center; cursor: pointer;">
                                <input type="checkbox" id="consent" style="margin-right: 0.75rem;" required>
                                I agree to the <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">privacy policy</a> and terms
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn" id="sendButton">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                    
                    <div id="status"></div>
                </form>
                
                <div class="social-links">
                    <a href="#" class="social-link" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-link" title="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-link" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social-link" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#" class="social-link" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden audio element for success sound -->
    <audio id="successSound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3" preload="auto"></audio>

    <script>
        // File type to icon mapping
        const fileTypeIcons = {
            'image': 'fa-file-image',
            'video': 'fa-file-video',
            'audio': 'fa-file-audio',
            'application/pdf': 'fa-file-pdf',
            'application/msword': 'fa-file-word',
            'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'fa-file-word',
            'application/vnd.ms-excel': 'fa-file-excel',
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': 'fa-file-excel',
            'application/vnd.ms-powerpoint': 'fa-file-powerpoint',
            'application/vnd.openxmlformats-officedocument.presentationml.presentation': 'fa-file-powerpoint',
            'text/plain': 'fa-file-alt',
            'text/csv': 'fa-file-csv',
            'application/zip': 'fa-file-archive',
            'application/x-rar-compressed': 'fa-file-archive',
            'application/x-7z-compressed': 'fa-file-archive',
            'default': 'fa-file'
        };

        // Get icon class for file type
        function getFileIcon(fileType) {
            if (fileType.startsWith('image/')) return fileTypeIcons['image'];
            if (fileType.startsWith('video/')) return fileTypeIcons['video'];
            if (fileType.startsWith('audio/')) return fileTypeIcons['audio'];
            
            return fileTypeIcons[fileType] || fileTypeIcons['default'];
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Media upload preview functionality
        const mediaFileInput = document.getElementById('mediaFile');
        const mediaPreview = document.getElementById('mediaPreview');
        
        mediaFileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            
            mediaPreview.innerHTML = '';
            mediaPreview.style.display = 'block';
            
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    mediaPreview.appendChild(img);
                    addRemoveButton();
                };
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.controls = true;
                video.src = URL.createObjectURL(file);
                mediaPreview.appendChild(video);
                addRemoveButton();
            } else if (file.type.startsWith('audio/')) {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = URL.createObjectURL(file);
                mediaPreview.appendChild(audio);
                addRemoveButton();
            } else {
                // For documents and other file types
                const filePreview = document.createElement('div');
                filePreview.className = 'file-preview';
                
                const icon = document.createElement('i');
                icon.className = 'fas ' + getFileIcon(file.type);
                
                const fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';
                
                const fileName = document.createElement('div');
                fileName.className = 'file-name';
                fileName.textContent = file.name;
                
                const fileSize = document.createElement('div');
                fileSize.className = 'file-size';
                fileSize.textContent = formatFileSize(file.size);
                
                // Add progress bar (will be shown during upload)
                const progressContainer = document.createElement('div');
                progressContainer.className = 'file-progress';
                const progressBar = document.createElement('div');
                progressBar.className = 'file-progress-bar';
                progressContainer.appendChild(progressBar);
                
                fileInfo.appendChild(fileName);
                fileInfo.appendChild(fileSize);
                fileInfo.appendChild(progressContainer);
                filePreview.appendChild(icon);
                filePreview.appendChild(fileInfo);
                mediaPreview.appendChild(filePreview);
                addRemoveButton();
            }
        });
        
        function addRemoveButton() {
            const removeBtn = document.createElement('span');
            removeBtn.className = 'remove-media';
            removeBtn.innerHTML = '<i class="fas fa-times"></i> Remove file';
            removeBtn.addEventListener('click', function() {
                mediaFileInput.value = '';
                mediaPreview.innerHTML = '';
                mediaPreview.style.display = 'none';
            });
            mediaPreview.appendChild(removeBtn);
        }
        
        // Form submission
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const subject = document.getElementById('subject').value;
            const messageText = document.getElementById('message').value.trim();
            const consent = document.getElementById('consent').checked;
            const mediaFile = mediaFileInput.files[0];
            const status = document.getElementById('status');
            const form = document.getElementById('contactForm');
            
            // Reset status and remove error classes
            status.style.display = 'none';
            document.querySelectorAll('.form-control').forEach(el => {
                el.classList.remove('shake');
                el.style.borderColor = '#E5E7EB';
            });
            
            // Validate fields
            let isValid = true;
            
            if (!name) {
                showError('name', 'Please enter your name');
                isValid = false;
            }
            
            if (!email) {
                showError('email', 'Please enter your email address');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            if (!contact) {
                showError('contact', 'Please enter your phone number');
                isValid = false;
            } else if (!contact.startsWith('+')) {
                showError('contact', 'Phone number must start with country code (e.g. +1, +44)');
                isValid = false;
            } else if (!/^\+[0-9]{7,15}$/.test(contact)) {
                showError('contact', 'Please enter a valid phone number with country code');
                isValid = false;
            }
            
            if (!subject) {
                showError('subject', 'Please select a subject');
                isValid = false;
            }
            
            if (!messageText) {
                showError('message', 'Please enter your message');
                isValid = false;
            } else if (messageText.length < 10) {
                showError('message', 'Message should be at least 10 characters');
                isValid = false;
            }
            
            if (!consent) {
                showError('', 'Please agree to the privacy policy and terms');
                isValid = false;
            }
            
            if (mediaFile && mediaFile.size > 20 * 1024 * 1024) { // 20MB limit
                showError('', 'File size should be less than 20MB');
                isValid = false;
            }
            
            if (!isValid) {
                return;
            }
            
            // Format the message
            const formattedMessage = `📩 New Contact Message\n\n` +
                                   `👤 Name: ${name}\n` +
                                   `📧 Email: ${email}\n` +
                                   `📱 Phone: ${contact}\n` +
                                   `📌 Subject: ${subject}\n` +
                                   `📝 Message:\n\n${messageText}`;
            
            // ⚠️ REPLACE THESE WITH YOUR VALUES ⚠️
            const BOT_TOKEN = "8250913678:AAEtTmVbDAsp56DTyDj-ks5GciaGIU-GVmw"; // From @BotFather
            const CHAT_ID = "8066867816";     // Your chat ID (get it from /getUpdates)
            
            try {
                // Show loading state
                status.textContent = "Sending your message...";
                status.className = "status-loading";
                status.style.display = 'block';
                
                const sendButton = document.getElementById('sendButton');
                sendButton.disabled = true;
                sendButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                
                if (mediaFile) {
                    // If media is attached, send it with caption
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('caption', formattedMessage);
                    formData.append('parse_mode', 'Markdown');
                    
                    // Determine media type and appropriate field name
                    let endpoint;
                    if (mediaFile.type.startsWith('image/')) {
                        formData.append('photo', mediaFile);
                        endpoint = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                    } else if (mediaFile.type.startsWith('video/')) {
                        formData.append('video', mediaFile);
                        endpoint = `https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`;
                    } else if (mediaFile.type.startsWith('audio/')) {
                        formData.append('audio', mediaFile);
                        endpoint = `https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`;
                    } else {
                        // For documents and other file types
                        formData.append('document', mediaFile);
                        endpoint = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
                    }
                    
                    // Show upload progress
                    const progressBar = document.querySelector('.file-progress-bar');
                    if (progressBar) {
                        document.querySelector('.file-progress').style.display = 'block';
                        
                        const xhr = new XMLHttpRequest();
                        xhr.upload.addEventListener('progress', (e) => {
                            if (e.lengthComputable) {
                                const percentComplete = (e.loaded / e.total) * 100;
                                progressBar.style.width = percentComplete + '%';
                            }
                        });
                        
                        xhr.open('POST', endpoint, true);
                        xhr.send(formData);
                        
                        const response = await new Promise((resolve, reject) => {
                            xhr.onload = () => {
                                if (xhr.status >= 200 && xhr.status < 300) {
                                    resolve(JSON.parse(xhr.responseText));
                                } else {
                                    reject(new Error(xhr.statusText));
                                }
                            };
                            xhr.onerror = () => reject(new Error('Network Error'));
                        });
                        
                        if (!response.ok) {
                            throw new Error(response.description || 'Failed to send file with message');
                        }
                    } else {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            body: formData
                        });
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.description || 'Failed to send file with message');
                        }
                    }
                } else {
                    // If no media, send just the text message
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: formattedMessage,
                            parse_mode: 'Markdown'
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.description || 'Failed to send message');
                    }
                }
                
                // Success - play the audio
                const successSound = document.getElementById('successSound');
                successSound.play().catch(e => console.log("Audio play failed:", e));
                
                // Show success message
                status.textContent = "✅ Your message has been sent successfully! We'll contact you soon.";
                status.className = "status-success";
                
                // Reset form
                form.reset();
                mediaPreview.innerHTML = '';
                mediaPreview.style.display = 'none';
                document.getElementById('consent').checked = false;
                
                // Add temporary confetti effect
                confettiEffect();
            } catch (error) {
                console.error("Error:", error);
                status.textContent = `❌ Error: ${error.message || 'Failed to send message. Please try again later.'}`;
                status.className = "status-error";
            } finally {
                status.style.display = 'block';
                const sendButton = document.getElementById('sendButton');
                sendButton.disabled = false;
                sendButton.innerHTML = '<i class="fas fa-paper-plane"></i> Send Message';
            }
        });
        
        function showError(fieldId, message) {
            if (fieldId) {
                const field = document.getElementById(fieldId);
                field.classList.add('shake');
                field.style.borderColor = 'var(--error)';
                
                // Remove shake animation after it completes
                setTimeout(() => {
                    field.classList.remove('shake');
                }, 400);
            }
            
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = "status-error";
            status.style.display = 'block';
        }
        
        function confettiEffect() {
            const colors = ['#4361ee', '#7209b7', '#f72585', '#4cc9f0', '#3a0ca3'];
            const container = document.querySelector('.container');
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                confetti.style.opacity = '0';
                confetti.style.transform = 'translateY(0) rotate(0deg)';
                confetti.style.zIndex = '1000';
                confetti.style.boxShadow = '0 2px 4px rgba(0, 0, 0, 0.2)';
                
                container.appendChild(confetti);
                
                const animationDuration = Math.random() * 3 + 2;
                const animationDelay = Math.random() * 2;
                
                setTimeout(() => {
                    confetti.style.transition = `all ${animationDuration}s cubic-bezier(0.1, 0.8, 0.3, 1)`;
                    confetti.style.opacity = '1';
                    confetti.style.transform = `translateY(${window.innerHeight}px) rotate(${Math.random() * 360}deg)`;
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, animationDuration * 1000);
                }, i * 50 + animationDelay * 1000);
            }
        }
    </script>
</body>
</html>
